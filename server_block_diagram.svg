<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="620" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Streaming Voice Clone — Module Block Diagram</text>

  <!-- ================================================================ -->
  <!-- Model Loading Block -->
  <!-- ================================================================ -->
  <rect x="40" y="56" width="340" height="130" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Qwen3TTSModel</text>

  <rect x="56" y="90" width="308" height="86" rx="5" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="210" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f" font-family="monospace">TTS = Qwen3TTSModel.from_pretrained(</text>
  <text x="210" y="126" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">model,</text>
  <text x="210" y="142" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">device_map, dtype,</text>
  <text x="210" y="158" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">attn_implementation )</text>

  <!-- ================================================================ -->
  <!-- Prompt Cache Block -->
  <!-- ================================================================ -->
  <rect x="440" y="56" width="340" height="130" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="610" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">Prompt Cache</text>

  <rect x="456" y="90" width="308" height="86" rx="5" fill="#fff" stroke="#fde68a" stroke-width="1"/>
  <text x="610" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e" font-family="monospace">voice_clone_prompt = get_prompt(</text>
  <text x="610" y="126" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">username, lang, style )</text>
  <text x="610" y="148" text-anchor="middle" font-size="10" fill="#a16207">built from: create_voice_clone_prompt(</text>
  <text x="610" y="162" text-anchor="middle" font-size="10" fill="#a16207">ref_audio, ref_text, x_vector_only_mode=False )</text>

  <!-- Arrow: Prompt Cache -> Stream Generator -->
  <line x1="610" y1="186" x2="610" y2="222" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="622" y="210" font-size="9" fill="#854d0e">voice_clone_prompt</text>

  <!-- Arrow: Model -> Stream Generator -->
  <line x1="210" y1="186" x2="210" y2="222" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="222" y="210" font-size="9" fill="#1e40af">TTS instance</text>

  <!-- ================================================================ -->
  <!-- Stream Generator Block -->
  <!-- ================================================================ -->
  <rect x="40" y="222" width="740" height="120" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="410" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">TTS.stream_generate_voice_clone()</text>

  <rect x="56" y="256" width="708" height="74" rx="5" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d" font-family="monospace">for chunk, sr in TTS.stream_generate_voice_clone(</text>
  <text x="410" y="294" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">text, language, voice_clone_prompt,</text>
  <text x="410" y="312" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">emit_every_frames=8, decode_window_frames=80, overlap_samples=0 ):</text>

  <!-- Yield annotation -->
  <rect x="636" y="252" width="120" height="20" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="696" y="266" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">yields (chunk, sr)</text>

  <!-- Arrow: Stream Generator -> PCM Conversion -->
  <line x1="410" y1="342" x2="410" y2="378" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="422" y="365" font-size="9" fill="#475569">chunk (float32 numpy array)</text>

  <!-- ================================================================ -->
  <!-- PCM Conversion Block -->
  <!-- ================================================================ -->
  <rect x="120" y="378" width="580" height="80" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="410" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">float32 → int16 PCM Conversion</text>

  <rect x="136" y="410" width="548" height="38" rx="5" fill="#fff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="410" y="428" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">np.clip(chunk, -1.0, 1.0) → (× 32767).astype(np.int16) → .tobytes()</text>
  <text x="410" y="442" text-anchor="middle" font-size="10" fill="#9333ea">raw PCM bytes (16-bit signed little-endian)</text>

  <!-- Arrow: PCM -> HTTP Write -->
  <line x1="410" y1="458" x2="410" y2="494" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="422" y="481" font-size="9" fill="#475569">int16 PCM bytes</text>

  <!-- ================================================================ -->
  <!-- HTTP Streaming Block -->
  <!-- ================================================================ -->
  <rect x="120" y="494" width="580" height="56" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="410" y="516" text-anchor="middle" font-size="13" font-weight="700" fill="#be123c">HTTP Streaming Response</text>

  <rect x="136" y="524" width="548" height="18" rx="4" fill="#fff" stroke="#fda4af" stroke-width="1"/>
  <text x="410" y="537" text-anchor="middle" font-size="11" fill="#475569" font-family="monospace">self.wfile.write(pcm_int16.tobytes());  self.wfile.flush()</text>

  <!-- Arrow: HTTP -> Browser -->
  <line x1="410" y1="550" x2="410" y2="572" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ================================================================ -->
  <!-- Browser Block -->
  <!-- ================================================================ -->
  <rect x="250" y="572" width="320" height="36" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="596" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Browser — Web Audio API (gapless playback)</text>

  <!-- ================================================================ -->
  <!-- BrokenPipeError annotation -->
  <!-- ================================================================ -->
  <rect x="40" y="500" width="74" height="44" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="77" y="518" text-anchor="middle" font-size="8.5" font-weight="600" fill="#dc2626">BrokenPipe</text>
  <text x="77" y="530" text-anchor="middle" font-size="8.5" font-weight="600" fill="#dc2626">Error</text>
  <text x="77" y="540" text-anchor="middle" font-size="7.5" fill="#991b1b">(client disconnect)</text>

  <line x1="114" y1="522" x2="120" y2="522" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>

  <!-- ================================================================ -->
  <!-- HTTP Headers annotation -->
  <!-- ================================================================ -->
  <rect x="712" y="494" width="96" height="56" rx="6" fill="#fff" stroke="#e11d48" stroke-width="1"/>
  <text x="760" y="509" text-anchor="middle" font-size="8" font-weight="600" fill="#be123c">Response Headers</text>
  <text x="760" y="522" text-anchor="middle" font-size="8" fill="#475569" font-family="monospace">Content-Type:</text>
  <text x="760" y="532" text-anchor="middle" font-size="7.5" fill="#475569" font-family="monospace">application/octet-stream</text>
  <text x="760" y="544" text-anchor="middle" font-size="8" fill="#475569" font-family="monospace">X-Sample-Rate: 24000</text>

  <line x1="700" y1="522" x2="712" y2="522" stroke="#e11d48" stroke-width="1"/>

</svg>
