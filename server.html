<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoXMiX</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
  .container { max-width: 840px; margin: 2rem auto; padding: 0 1rem; }
  h1 { margin-bottom: .3rem; }
  h2 { margin: 1.5rem 0 .8rem; font-size: 1.15rem; border-bottom: 2px solid #2563eb; padding-bottom: .3rem; }
  .info { color: #666; margin-bottom: 1rem; font-size: .9rem; }
  label { display: block; font-weight: 600; margin: .6rem 0 .2rem; }
  input[type=text], textarea, select {
    width: 100%; padding: .45rem; border: 1px solid #ccc; border-radius: 4px; font-size: .95rem;
  }
  textarea { resize: vertical; min-height: 70px; }
  button {
    margin-top: .8rem; padding: .5rem 1.5rem; background: #2563eb; color: #fff;
    border: none; border-radius: 4px; font-size: .95rem; cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #93b4f5; cursor: wait; }
  .status { margin-top: .5rem; font-size: .85rem; color: #666; min-height: 1.2em; }
  audio { margin-top: .8rem; width: 100%; }
  .hidden { display: none; }

  /* mic button */
  #mic-btn.recording { background: #dc2626; animation: mic-pulse 1s infinite; }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.4); }
    50% { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
  }

  /* upload section outer accordion */
  #upload-section > .acc-header { padding: .5rem .8rem; background: #fff; border-bottom: 2px solid #2563eb; }
  #upload-section > .acc-header:hover { background: #f8fafc; }
  #upload-section > .acc-header .acc-title { font-size: 1.15rem; }

  /* accordion */
  .accordion { margin-top: .8rem; }
  .acc-item { border: 1px solid #ddd; border-radius: 6px; margin-bottom: .5rem; background: #fff; overflow: hidden; }
  .acc-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: .6rem .8rem; cursor: pointer; user-select: none; background: #fafafa;
  }
  .acc-header:hover { background: #f0f0f0; }
  .acc-title { font-weight: 600; font-size: .95rem; }
  .acc-summary { font-size: .85rem; color: #666; display: flex; gap: .6rem; }
  .acc-summary .done { color: #16a34a; font-weight: 600; }
  .acc-summary .partial { color: #d97706; font-weight: 600; }
  .acc-summary .none { color: #dc2626; font-weight: 600; }
  .acc-arrow { transition: transform .2s; font-size: .8rem; color: #999; }
  .acc-item.open > .acc-header .acc-arrow { transform: rotate(90deg); }
  .acc-body { display: none; padding: .5rem .8rem .8rem; border-top: 1px solid #eee; }
  .acc-item.open > .acc-body { display: block; }

  /* upload cards inside accordion */
  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
  .upload-card {
    border: 1px solid #ddd; border-radius: 6px; padding: .8rem; background: #f9f9f9;
  }
  .upload-card h3 { font-size: .9rem; margin-bottom: .3rem; }
  .upload-card .ref-text { font-size: .78rem; color: #888; margin-bottom: .5rem; max-height: 55px; overflow-y: auto; }
  .upload-card input[type=file] { font-size: .85rem; }
  .upload-card .card-status { font-size: .8rem; color: #666; margin-top: .3rem; min-height: 1em; }
  .upload-card .cached { color: #16a34a; font-weight: 600; }
  .upload-card .not-registered { color: #dc2626; font-weight: 600; }

  /* generate section */
  .gen-row { display: flex; gap: .8rem; align-items: flex-end; flex-wrap: wrap; }
  .gen-row > * { flex: 1; min-width: 150px; }

  /* toast — fullscreen overlay */
  .toast-container {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .toast {
    background: rgba(0, 0, 0, 0.5); color: #fff;
    padding: 2rem 1.5rem; border-radius: 12px;
    font-size: 1.2rem; max-width: 90vw; width: 100%;
    text-align: center; line-height: 1.6;
    opacity: 0;
    animation: toast-in .3s ease forwards;
    pointer-events: auto;
  }
  .toast.toast-out {
    animation: toast-out .3s ease forwards;
  }
  .toast-label { font-size: .85rem; color: #cbd5e1; margin-bottom: .5rem; }
  .toast-close {
    position: absolute; top: .3rem; right: .5rem;
    background: none; border: none; color: #fff; font-size: 1.1rem;
    cursor: pointer; opacity: .7; padding: 0; margin: 0; line-height: 1;
  }
  .toast-close:hover { opacity: 1; }
  @keyframes toast-in {
    to { opacity: 1; }
  }
  @keyframes toast-out {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* pinned toast — top-right, 50% width, 10% height, 30% opacity */
  .toast-pinned-container {
    position: fixed; top: .5rem; right: .5rem; z-index: 9998;
    width: 50%; max-height: 10vh;
    pointer-events: auto;
  }
  .toast-pinned {
    position: relative;
    background: rgba(0, 0, 0, 0.3); color: #fff;
    padding: .5rem .8rem; padding-right: 2rem; border-radius: 8px;
    font-size: .85rem; line-height: 1.4;
    max-height: 10vh; overflow-y: auto;
    animation: toast-in .3s ease forwards;
  }
  .toast-pinned .toast-label { font-size: .75rem; margin-bottom: .2rem; }
  .toast-pinned.toast-out {
    animation: toast-out .3s ease forwards;
  }

  @media (max-width: 600px) {
    .upload-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>VoXMiX</h1>
  <p class="info">Model: <code id="model-kind">loading...</code></p>

  <!-- ==================== Upload Section (outer accordion) ==================== -->
  <div class="acc-item" id="upload-section" style="margin-top:1rem;">
    <div class="acc-header" onclick="toggleUploadSection()">
      <div style="display:flex;align-items:center;gap:.6rem;">
        <span class="acc-arrow" id="upload-arrow">&#9654;</span>
        <span class="acc-title">1. Reference Audio 登録</span>
        <span id="upload-username-badge" style="font-size:.85rem;color:#2563eb;font-weight:600;"></span>
      </div>
      <div class="acc-summary" id="upload-summary"></div>
    </div>
    <div class="acc-body">
      <p style="font-size:.9rem;margin-bottom:.5rem;">
        ユーザ名を入力し、各言語のアコーディオンを開いて音声をアップロードしてください。
      </p>
      <label for="username">ユーザ名</label>
      <input type="text" id="username" placeholder="例: tanaka" style="max-width:300px;" onclick="event.stopPropagation();">
      <div class="accordion" id="accordion-container"></div>
    </div>
  </div>

  <!-- ==================== Generate Section ==================== -->
  <h2>2. 音声合成</h2>

  <div class="gen-row">
    <div>
      <label for="gen-user">ユーザ名</label>
      <select id="gen-user"></select>
    </div>
    <div>
      <label for="gen-style">スタイル</label>
      <select id="gen-style"></select>
    </div>
    <div>
      <label for="gen-out-lang">出力言語</label>
      <select id="gen-out-lang">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="ch">中文</option>
      </select>
    </div>
  </div>

  <div style="display:flex;align-items:flex-end;gap:.5rem;margin-top:.6rem;">
    <div style="flex:1;">
      <label for="gen-text">テキスト</label>
      <textarea id="gen-text" placeholder="合成したいテキストを入力、またはマイクで音声入力..."></textarea>
    </div>
    <div style="display:flex;flex-direction:column;gap:.3rem;align-items:center;padding-bottom:4px;">
      <select id="asr-lang" style="width:auto;padding:.2rem .3rem;font-size:.8rem;">
        <option value="ja-JP">日本語</option>
        <option value="en-US">English</option>
        <option value="zh-CN">中文</option>
      </select>
      <button type="button" id="mic-btn" onclick="toggleASR()" title="音声入力"
        style="width:44px;height:44px;border-radius:50%;font-size:1.3rem;padding:0;margin:0;display:flex;align-items:center;justify-content:center;">
        <span id="mic-icon">&#127908;</span>
      </button>
    </div>
  </div>

  <button id="gen-btn" onclick="doSmartGenerate()">Generate</button>
  <div class="status" id="gen-status"></div>
  <div style="display:flex;align-items:center;gap:.8rem;margin-top:.8rem;">
    <audio id="player" controls class="hidden" style="flex:1;margin:0;"></audio>
    <label id="loop-label" class="hidden" style="display:none;align-items:center;gap:.3rem;font-size:.85rem;white-space:nowrap;cursor:pointer;">
      <input type="checkbox" id="loop-check" onchange="$('#player').loop = this.checked"> ループ再生
    </label>
  </div>

  <!-- ==================== Scenario Section ==================== -->
  <h2>3. シナリオ再生</h2>
  <p style="font-size:.9rem;margin-bottom:.5rem;">
    シナリオ JSON ファイルを読み込んで、複数のセリフを一括合成・再生します。
  </p>

  <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;">
    <input type="file" id="scenario-file" accept=".json,application/json" onchange="loadScenarioFile(this)">
    <button id="scenario-btn" onclick="doScenarioGenerate()" disabled>Scenario Generate</button>
  </div>

  <div id="scenario-preview" style="margin-top:.8rem;"></div>
  <div class="status" id="scenario-status"></div>
  <div style="display:flex;align-items:center;gap:.8rem;margin-top:.8rem;">
    <audio id="scenario-player" controls class="hidden" style="flex:1;margin:0;"></audio>
    <label id="scenario-loop-label" class="hidden" style="display:none;align-items:center;gap:.3rem;font-size:.85rem;white-space:nowrap;cursor:pointer;">
      <input type="checkbox" id="scenario-loop-check" onchange="$('#scenario-player').loop = this.checked"> ループ再生
    </label>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<div class="toast-pinned-container" id="toast-pinned-container"></div>

<script>
// =========================================================================
// Utilities
// =========================================================================
const $ = s => document.querySelector(s);

// --- IndexedDB helpers (persist username) ---
const DB_NAME = 'qwen3tts';
const DB_STORE = 'settings';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGet(key) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(undefined);
  });
}

async function dbSet(key, val) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(val, key);
    tx.oncomplete = () => resolve();
  });
}

// =========================================================================
// Data
// =========================================================================
const LANGS = [
  {id: 'ja', label: '日本語'},
  {id: 'en', label: 'English'},
  {id: 'ch', label: '中文'},
];

const STYLE_LABELS = {
  neutral: 'ニュース風（落ち着いたアナウンス調）',
  bright:  '明るく元気に',
  calm:    'ゆっくり穏やかに',
  angry:   '怒って（強い不満・抗議）',
  quit:    '無音（間）',
};

const REF_TEXTS = {
  ja: {
    neutral: '本日のトップニュースです。新しい再生可能エネルギー技術が発表されました。この技術は、発電効率を高めながらコストを削減できると期待されています。関係者によりますと、今年中に実証実験を開始し、来年春の本格導入を目指しているとのことです。',
    bright: 'みなさん、こんにちは！今日はとても嬉しいお知らせがあります！これまで努力してきたことが、ついに大きな成果につながりました。みなさんの応援があったからこそです。これからも一緒に、もっと素敵な未来を作っていきましょう！',
    calm: '少しだけ、深呼吸をしてみましょう。これまでの歩みを、ゆっくり振り返ってみてください。焦らなくても大丈夫です。一歩ずつ、確実に前へ進めばいいのです。今できることに、静かに集中してみましょう。',
    angry: 'この状況は、到底受け入れられるものではありません。何度も問題を指摘してきたにもかかわらず、改善はまったく見られませんでした。私たちは、曖昧な説明ではなく、明確な回答と、直ちに具体的な対応を求めます。',
  },
  en: {
    neutral: "Good evening. Today's top story: Researchers have announced a breakthrough in renewable energy technology. The new system is expected to improve efficiency while reducing costs for consumers. Officials say the project will begin testing later this year, with full deployment planned for next spring.",
    bright: "Hello everyone! I'm so excited to share this wonderful news with you today. We've reached an important milestone, and it's all thanks to your incredible support. This achievement opens the door to new opportunities, and I truly can't wait to see what we accomplish next together!",
    calm: "Let's take a quiet moment to reflect on the journey we've taken so far. Step by step, we have learned, adapted, and grown stronger. There is no need to rush. Progress comes steadily, with patience and care. Breathe deeply, and focus on one small task at a time.",
    angry: "This situation is completely unacceptable. We have raised this issue again and again, yet nothing has changed. People are tired of empty promises and repeated delays. We demand clear answers, and we expect immediate action to fix this problem once and for all.",
  },
  ch: {
    neutral: '请给我一杯水，谢谢。',
    bright: '请给我一杯水，谢谢。',
    calm: '请给我一杯水，谢谢。',
    angry: '请给我一杯水，谢谢。',
  },
};

const STYLE_IDS = ['neutral', 'bright', 'calm', 'angry'];

// =========================================================================
// State
// =========================================================================
let lastUserStatus = null; // {ja:{neutral:bool,...}, en:{...}, ch:{...}}
let translatorAvailable = false;

// =========================================================================
// Init
// =========================================================================
async function init() {
  const r = await fetch('/api/info');
  const info = await r.json();
  $('#model-kind').textContent = info.model_kind;

  translatorAvailable = !!info.translator_available;

  // build style dropdown for generate
  $('#gen-style').innerHTML = STYLE_IDS.map(s =>
    `<option value="${s}">${STYLE_LABELS[s]}</option>`
  ).join('');

  refreshUsers(info.cached_keys || []);
  renderAccordion();

  // restore username from IndexedDB
  const saved = await dbGet('username');
  if (saved) {
    $('#username').value = saved;
    await fetchUserStatus(saved);
  } else {
    // no user yet — open upload section
    $('#upload-section').classList.add('open');
  }

  // auto-check status when username changes
  let debounce;
  $('#username').addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      const u = $('#username').value.trim();
      if (u && /^[a-zA-Z0-9_-]+$/.test(u)) {
        await dbSet('username', u);
        await fetchUserStatus(u);
      } else {
        lastUserStatus = null;
        renderAccordion();
      }
    }, 400);
  });
}

// =========================================================================
// Upload Section (outer accordion)
// =========================================================================
function toggleUploadSection() {
  $('#upload-section').classList.toggle('open');
}

function isAllRegistered() {
  if (!lastUserStatus) return false;
  return LANGS.every(l => STYLE_IDS.every(s => lastUserStatus[l.id] && lastUserStatus[l.id][s]));
}

function updateUploadSection() {
  const username = $('#username').value.trim();
  const badge = $('#upload-username-badge');
  const summary = $('#upload-summary');
  const section = $('#upload-section');

  badge.textContent = username ? `[ ${username} ]` : '';

  if (!lastUserStatus) {
    summary.innerHTML = '';
    if (!section.classList.contains('open')) section.classList.add('open');
    return;
  }

  // build per-lang summary for outer header
  summary.innerHTML = LANGS.map(l => {
    const st = lastUserStatus[l.id];
    if (!st) return '';
    const done = STYLE_IDS.filter(s => st[s]).length;
    const total = STYLE_IDS.length;
    let cls = 'none';
    if (done === total) cls = 'done';
    else if (done > 0) cls = 'partial';
    return `<span>${l.label} <span class="${cls}">${done}/${total}</span></span>`;
  }).join('');

  // auto-collapse if all registered, auto-expand if not
  if (isAllRegistered()) {
    section.classList.remove('open');
  } else if (!section.classList.contains('open')) {
    section.classList.add('open');
  }
}

// =========================================================================
// Accordion (Reference Audio — inner per-language)
// =========================================================================
function toggleAccordion(langId) {
  const item = $(`#acc-${langId}`);
  if (item) item.classList.toggle('open');
}

function langSummary(langId) {
  if (!lastUserStatus || !lastUserStatus[langId]) return '';
  const st = lastUserStatus[langId];
  const done = STYLE_IDS.filter(s => st[s]).length;
  const total = STYLE_IDS.length;
  let cls = 'none';
  if (done === total) cls = 'done';
  else if (done > 0) cls = 'partial';
  return `<span class="${cls}">${done}/${total}</span>`;
}

function renderAccordion() {
  const container = $('#accordion-container');
  container.innerHTML = LANGS.map(l => {
    const texts = REF_TEXTS[l.id];
    const cards = STYLE_IDS.map(s => {
      let statusHtml = '';
      let audioHtml = '';
      const username = $('#username').value.trim();
      if (lastUserStatus && lastUserStatus[l.id]) {
        if (lastUserStatus[l.id][s]) {
          statusHtml = '<span class="cached">登録済み</span>';
          if (username) {
            const src = `/api/reference_audio?username=${encodeURIComponent(username)}&lang=${l.id}&style=${s}`;
            audioHtml = `<audio controls src="${src}" style="width:100%;height:32px;margin-top:.3rem;"></audio>`;
          }
        } else {
          statusHtml = '<span class="not-registered">未登録</span>';
        }
      }
      return `
        <div class="upload-card" id="card-${l.id}-${s}">
          <h3>${STYLE_LABELS[s]}</h3>
          <div class="ref-text">${texts[s]}</div>
          ${audioHtml}
          <input type="file" accept="audio/*" onchange="uploadRef(this, '${l.id}', '${s}')">
          <div class="card-status" id="status-${l.id}-${s}">${statusHtml}</div>
        </div>`;
    }).join('');

    return `
      <div class="acc-item" id="acc-${l.id}">
        <div class="acc-header" onclick="toggleAccordion('${l.id}')">
          <div style="display:flex;align-items:center;gap:.6rem;">
            <span class="acc-arrow">&#9654;</span>
            <span class="acc-title">${l.label}</span>
          </div>
          <div class="acc-summary" id="acc-summary-${l.id}">${langSummary(l.id)}</div>
        </div>
        <div class="acc-body">
          <div class="upload-grid">${cards}</div>
        </div>
      </div>`;
  }).join('');
}

async function fetchUserStatus(username) {
  try {
    const r = await fetch('/api/user_status?username=' + encodeURIComponent(username));
    const data = await r.json();
    lastUserStatus = data.styles;
  } catch (e) {
    lastUserStatus = null;
  }
  // preserve which accordions are open
  const openLangs = LANGS.filter(l => {
    const el = $(`#acc-${l.id}`);
    return el && el.classList.contains('open');
  }).map(l => l.id);

  renderAccordion();

  // restore open state
  for (const id of openLangs) {
    const el = $(`#acc-${id}`);
    if (el) el.classList.add('open');
  }

  updateUploadSection();
}

// =========================================================================
// User list (Generate section)
// =========================================================================
function refreshUsers(keys) {
  const users = [...new Set(keys.map(k => k.split('/')[0]))].sort();
  const sel = $('#gen-user');
  const prev = sel.value;
  sel.innerHTML = users.length
    ? users.map(u => `<option value="${u}">${u}</option>`).join('')
    : '<option value="">（未登録）</option>';
  if (users.includes(prev)) sel.value = prev;
}

// =========================================================================
// Upload
// =========================================================================
async function uploadRef(input, lang, style) {
  const file = input.files[0];
  if (!file) return;
  const username = $('#username').value.trim();
  if (!username) {
    alert('ユーザ名を入力してください');
    input.value = '';
    return;
  }
  if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
    alert('ユーザ名は英数字・ハイフン・アンダースコアのみ使用可');
    input.value = '';
    return;
  }

  const statusEl = $(`#status-${lang}-${style}`);
  statusEl.textContent = 'アップロード中...';

  try {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = '';
    const chunk = 8192;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    const b64 = btoa(binary);

    const r = await fetch('/api/upload_reference', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, lang, style, wav_base64: b64}),
    });
    const res = await r.json();
    if (!r.ok) {
      statusEl.textContent = 'Error: ' + (res.error || r.statusText);
      return;
    }
    statusEl.innerHTML = '<span class="cached">登録済み</span>';

    // add or refresh audio player in the card
    const card = $(`#card-${lang}-${style}`);
    let audioEl = card.querySelector('audio');
    const src = `/api/reference_audio?username=${encodeURIComponent(username)}&lang=${lang}&style=${style}&t=${Date.now()}`;
    if (audioEl) {
      audioEl.src = src;
    } else {
      audioEl = document.createElement('audio');
      audioEl.controls = true;
      audioEl.src = src;
      audioEl.style.cssText = 'width:100%;height:32px;margin-top:.3rem;';
      card.querySelector('.ref-text').insertAdjacentElement('afterend', audioEl);
    }

    // update local status cache & summary
    if (lastUserStatus) {
      if (!lastUserStatus[lang]) lastUserStatus[lang] = {};
      lastUserStatus[lang][style] = true;
    }
    const summaryEl = $(`#acc-summary-${lang}`);
    if (summaryEl) summaryEl.innerHTML = langSummary(lang);

    // persist username & refresh user list
    await dbSet('username', username);
    const infoR = await fetch('/api/info');

// =========================================================================
// Streaming playback (Web Audio API)
// =========================================================================
let currentAbortController = null;

function createWavBlob(allSamples, sampleRate) {
  const numSamples = allSamples.length;
  const bytesPerSample = 2;
  const dataSize = numSamples * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  // RIFF header
  view.setUint32(0, 0x52494646, false);  // "RIFF"
  view.setUint32(4, 36 + dataSize, true);
  view.setUint32(8, 0x57415645, false);  // "WAVE"

  // fmt chunk
  view.setUint32(12, 0x666d7420, false); // "fmt "
  view.setUint32(16, 16, true);          // chunk size
  view.setUint16(20, 1, true);           // PCM format
  view.setUint16(22, 1, true);           // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * bytesPerSample, true); // byte rate
  view.setUint16(32, bytesPerSample, true); // block align
  view.setUint16(34, 16, true);          // bits per sample

  // data chunk
  view.setUint32(36, 0x64617461, false); // "data"
  view.setUint32(40, dataSize, true);

  // Write PCM samples (already int16)
  const output = new Int16Array(buffer, 44);
  output.set(allSamples);

  return new Blob([buffer], {type: 'audio/wav'});
}

async function playStreamingResponse(response, genStartTime) {
  const sampleRate = parseInt(response.headers.get('X-Sample-Rate') || '24000', 10);
  const reader = response.body.getReader();

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate});
  let nextStartTime = 0;
  let allInt16Samples = [];
  let leftover = null; // leftover byte when chunk has odd length
  let chunkCount = 0;
  const t0 = genStartTime || performance.now();
  let tFirst = null;

  try {
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      // Combine leftover byte with new data
      let bytes;
      if (leftover) {
        bytes = new Uint8Array(leftover.length + value.length);
        bytes.set(leftover, 0);
        bytes.set(value, leftover.length);
        leftover = null;
      } else {
        bytes = value;
      }

      // Save leftover if odd number of bytes (int16 = 2 bytes)
      const usableLen = bytes.length & ~1; // round down to even
      if (bytes.length > usableLen) {
        leftover = bytes.slice(usableLen);
      }
      if (usableLen === 0) continue;

      // Convert int16 LE bytes to Int16Array
      const int16 = new Int16Array(bytes.buffer, bytes.byteOffset, usableLen / 2);

      // Collect for WAV blob later
      allInt16Samples.push(Int16Array.from(int16));

      // Convert to float32 for Web Audio
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768;
      }

      // Schedule audio buffer
      const audioBuffer = audioCtx.createBuffer(1, float32.length, sampleRate);
      audioBuffer.getChannelData(0).set(float32);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);

      const startTime = Math.max(audioCtx.currentTime, nextStartTime);
      source.start(startTime);
      nextStartTime = startTime + audioBuffer.duration;

      chunkCount++;
      if (tFirst === null) {
        tFirst = performance.now();
        const latency = ((tFirst - t0) / 1000).toFixed(2);
        $('#gen-status').textContent = `Latency: ${latency}s — Streaming...`;
      } else {
        const latency = ((tFirst - t0) / 1000).toFixed(2);
        $('#gen-status').textContent = `Latency: ${latency}s — Streaming... ${chunkCount} chunks`;
      }
    }
  } finally {
    // Build WAV blob for <audio> player (for replay / scrubbing)
    const totalLen = allInt16Samples.reduce((s, a) => s + a.length, 0);
    const merged = new Int16Array(totalLen);
    let offset = 0;
    for (const arr of allInt16Samples) {
      merged.set(arr, offset);
      offset += arr.length;
    }

    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
    const audioDuration = (totalLen / sampleRate).toFixed(1);

    if (totalLen > 0) {
      const wavBlob = createWavBlob(merged, sampleRate);
      const url = URL.createObjectURL(wavBlob);
      const player = $('#player');
      player.src = url;
      player.loop = $('#loop-check').checked;
      player.classList.remove('hidden');
      $('#loop-label').style.display = 'flex';
    }

    const latency = tFirst ? ((tFirst - t0) / 1000).toFixed(2) : '-';
    $('#gen-status').textContent = `Done in ${elapsed}s — Latency: ${latency}s (${audioDuration}s audio, ${chunkCount} chunks)`;

    // Close audio context after playback finishes
    const remainingTime = Math.max(0, nextStartTime - audioCtx.currentTime);
    setTimeout(() => audioCtx.close().catch(() => {}), (remainingTime + 0.5) * 1000);
  }
}

// =========================================================================
// ASR (Web Speech API)
// =========================================================================
let asrRecognition = null;
let asrRunning = false;

function toggleASR() {
  if (asrRunning) {
    stopASR(true);
  } else {
    startASR();
  }
}

function startASR() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('このブラウザは音声認識に対応していません。Chrome を使用してください。');
    return;
  }

  const lang = $('#asr-lang').value;
  asrRecognition = new SpeechRecognition();
  asrRecognition.lang = lang;
  asrRecognition.continuous = true;
  asrRecognition.interimResults = true;

  $('#gen-text').value = '';
  let finalText = '';

  asrRecognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText += t;
      } else {
        interim += t;
      }
    }
    $('#gen-text').value = finalText + interim;
  };

  asrRecognition.onerror = (e) => {
    if (e.error !== 'aborted') {
      console.error('ASR error:', e.error);
    }
    stopASR();
  };

  asrRecognition.onend = () => {
    // if still flagged as running, browser stopped early — restart
    if (asrRunning) {
      try { asrRecognition.start(); } catch(e) { stopASR(); }
    }
  };

  asrRecognition.start();
  asrRunning = true;
  $('#mic-btn').classList.add('recording');
  $('#mic-icon').textContent = '\u23F9'; // stop icon
}

function stopASR(userTriggered = false) {
  asrRunning = false;
  if (asrRecognition) {
    try { asrRecognition.abort(); } catch(e) {}
    asrRecognition = null;
  }
  $('#mic-btn').classList.remove('recording');
  $('#mic-icon').innerHTML = '&#127908;'; // mic icon

  // force-release microphone to stop audio ducking
  releaseMicrophone();

  // auto-generate when user manually stops and there is text
  if (userTriggered && $('#gen-text').value.trim()) {
    doSmartGenerate();
  }
}

function releaseMicrophone() {
  navigator.mediaDevices.getUserMedia({audio: true})
    .then(stream => stream.getTracks().forEach(t => t.stop()))
    .catch(() => {});
}

// =========================================================================
// Toast
// =========================================================================
function showToast(label, message, durationMs = 3000) {
  // 1. Full-screen center toast
  const container = $('#toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div class="toast-label">${label}</div><div>${message}</div>`;
  container.appendChild(el);

  // 2. After duration, fade out center toast and pin to top-right
  setTimeout(() => {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => {
      el.remove();
      pinToast(label, message);
    });
  }, durationMs);
}

function pinToast(label, message) {
  const container = $('#toast-pinned-container');
  // remove previous pinned toast
  container.innerHTML = '';

  const el = document.createElement('div');
  el.className = 'toast-pinned';
  el.innerHTML =
    `<button class="toast-close" onclick="dismissPinnedToast()">&times;</button>` +
    `<div class="toast-label">${label}</div><div>${message}</div>`;
  container.appendChild(el);
}

function dismissPinnedToast() {
  const container = $('#toast-pinned-container');
  const el = container.querySelector('.toast-pinned');
  if (el) {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove());
  }
}

// =========================================================================
// Smart Generate (auto-translate if ASR lang != out lang)
// =========================================================================
const ASR_TO_LANG = {'ja-JP': 'ja', 'en-US': 'en', 'zh-CN': 'ch'};

async function doSmartGenerate() {
  const user = $('#gen-user').value;
  const style = $('#gen-style').value;
  const outLang = $('#gen-out-lang').value;
  const text = $('#gen-text').value.trim();
  const asrLang = ASR_TO_LANG[$('#asr-lang').value] || outLang;

  if (!user) { $('#gen-status').textContent = 'ユーザを選択してください'; return; }
  if (!text) { $('#gen-status').textContent = 'テキストを入力してください'; return; }

  const genStartTime = performance.now();

  // Abort any in-progress stream
  if (currentAbortController) {
    currentAbortController.abort();
    currentAbortController = null;
  }

  const needTranslate = translatorAvailable && asrLang !== outLang;

  const btn = $('#gen-btn');
  btn.disabled = true;
  $('#player').classList.add('hidden');
  $('#loop-label').style.display = 'none';

  let genText = text;

  try {
    // 1. Translate if needed
    if (needTranslate) {
      $('#gen-status').textContent = '翻訳中...';
      const params = new URLSearchParams({src: text, inlng: asrLang, outlng: outLang});
      const tr = await fetch('/api/translate?' + params.toString());
      const trData = await tr.json();
      if (!tr.ok || trData.error) {
        $('#gen-status').textContent = 'Translation Error: ' + (trData.error || tr.statusText);
        return;
      }
      genText = trData.translated;

      const langNames = {ja: '日本語', en: 'English', ch: '中文'};
      showToast(
        `翻訳 (${langNames[asrLang]} → ${langNames[outLang]})`,
        genText,
        5000
      );
    }

    // 2. Stream generate
    $('#gen-status').textContent = 'Generating...';
    currentAbortController = new AbortController();
    const gr = await fetch('/api/generate_stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: user,
        style,
        ref_lang: outLang,
        out_lang: outLang,
        text: genText,
      }),
      signal: currentAbortController.signal,
    });
    if (!gr.ok) {
      const e = await gr.json().catch(() => ({error: gr.statusText}));
      $('#gen-status').textContent = 'Error: ' + (e.error || gr.statusText);
      return;
    }

    await playStreamingResponse(gr, genStartTime);
    currentAbortController = null;
  } catch (e) {
    if (e.name === 'AbortError') {
      $('#gen-status').textContent = 'Cancelled';
    } else {
      $('#gen-status').textContent = 'Error: ' + e.message;
    }
  } finally {
    btn.disabled = false;
    currentAbortController = null;
  }
}

// =========================================================================
// Scenario
// =========================================================================
let scenarioData = null;

const SCENARIO_LANG_LABELS = {
  japanese: '日本語', english: 'English', chinese: '中文',
  ja: '日本語', en: 'English', ch: '中文',
};

function loadScenarioFile(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data) || data.length === 0) {
        alert('シナリオは配列形式の JSON が必要です');
        return;
      }
      scenarioData = data;
      renderScenarioPreview();
      $('#scenario-btn').disabled = false;
      $('#scenario-status').textContent = `${data.length} エントリ読み込み完了`;
    } catch (err) {
      alert('JSON パースエラー: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function renderScenarioPreview() {
  const container = $('#scenario-preview');
  if (!scenarioData || scenarioData.length === 0) {
    container.innerHTML = '';
    return;
  }

  const rows = scenarioData.map((entry, i) => {
    const langOut = SCENARIO_LANG_LABELS[entry.langOut?.toLowerCase()] || entry.langOut;
    const styleLabel = STYLE_LABELS[entry.style] || entry.style;
    let textPreview;
    if (entry.style === 'quit') {
      const spaceCount = (entry.text || '').split('').filter(c => c === ' ').length;
      const ms = spaceCount * 30;
      textPreview = `🔇 ${ms}ms (${(ms/1000).toFixed(2)}s)`;
    } else {
      textPreview = entry.text.replace(/\r?\n/g, ' ');
    }
    return `<tr id="scenario-row-${i}"${entry.style === 'quit' ? ' style="background:#f5f5f5;color:#999;"' : ''}>
      <td style="padding:.3rem .5rem;font-size:.85rem;white-space:nowrap;">${i + 1}</td>
      <td style="padding:.3rem .5rem;font-size:.85rem;">${entry.userId}</td>
      <td style="padding:.3rem .5rem;font-size:.85rem;">${styleLabel}</td>
      <td style="padding:.3rem .5rem;font-size:.85rem;">${langOut}</td>
      <td style="padding:.3rem .5rem;font-size:.85rem;">${textPreview}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table style="width:100%;border-collapse:collapse;border:1px solid #ddd;background:#fff;border-radius:6px;overflow:hidden;">
      <thead>
        <tr style="background:#f0f0f0;">
          <th style="padding:.4rem .5rem;text-align:left;font-size:.85rem;">#</th>
          <th style="padding:.4rem .5rem;text-align:left;font-size:.85rem;">User</th>
          <th style="padding:.4rem .5rem;text-align:left;font-size:.85rem;">Style</th>
          <th style="padding:.4rem .5rem;text-align:left;font-size:.85rem;">Lang</th>
          <th style="padding:.4rem .5rem;text-align:left;font-size:.85rem;">Text</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function doScenarioGenerate() {
  if (!scenarioData || scenarioData.length === 0) {
    $('#scenario-status').textContent = 'シナリオを読み込んでください';
    return;
  }

  const btn = $('#scenario-btn');

  $('#scenario-status').textContent = 'Generating scenario...';
  $('#scenario-player').classList.add('hidden');

  // Reset row highlights
  scenarioData.forEach((_, i) => {
    const row = $(`#scenario-row-${i}`);
    if (row) row.style.background = '';
  });

  const t0 = performance.now();

  try {
    if (currentAbortController) {
      currentAbortController.abort();
      currentAbortController = null;
    }
    currentAbortController = new AbortController();

    const resp = await fetch('/api/generate_scenario_stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({scenario: scenarioData}),
      signal: currentAbortController.signal,
    });

    if (!resp.ok) {
      const e = await resp.json().catch(() => ({error: resp.statusText}));
      $('#scenario-status').textContent = 'Error: ' + (e.error || resp.statusText);
      return;
    }

    // Stream playback (reuse same approach as single generate)
    const sampleRate = parseInt(resp.headers.get('X-Sample-Rate') || '24000', 10);
    const reader = resp.body.getReader();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate});
    let nextStartTime = 0;
    let allInt16Samples = [];
    let leftover = null;
    let chunkCount = 0;
    let tFirst = null;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      let bytes;
      if (leftover) {
        bytes = new Uint8Array(leftover.length + value.length);
        bytes.set(leftover, 0);
        bytes.set(value, leftover.length);
        leftover = null;
      } else {
        bytes = value;
      }

      const usableLen = bytes.length & ~1;
      if (bytes.length > usableLen) {
        leftover = bytes.slice(usableLen);
      }
      if (usableLen === 0) continue;

      const int16 = new Int16Array(bytes.buffer, bytes.byteOffset, usableLen / 2);
      allInt16Samples.push(Int16Array.from(int16));

      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768;
      }

      const audioBuffer = audioCtx.createBuffer(1, float32.length, sampleRate);
      audioBuffer.getChannelData(0).set(float32);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);

      const startTime = Math.max(audioCtx.currentTime, nextStartTime);
      source.start(startTime);
      nextStartTime = startTime + audioBuffer.duration;

      chunkCount++;
      if (tFirst === null) {
        tFirst = performance.now();
        const latency = ((tFirst - t0) / 1000).toFixed(2);
        $('#scenario-status').textContent = `Latency: ${latency}s — Streaming scenario...`;
      } else {
        const latency = ((tFirst - t0) / 1000).toFixed(2);
        $('#scenario-status').textContent = `Latency: ${latency}s — Streaming... ${chunkCount} chunks`;
      }
    }

    // Build WAV for replay
    const totalLen = allInt16Samples.reduce((s, a) => s + a.length, 0);
    const merged = new Int16Array(totalLen);
    let offset = 0;
    for (const arr of allInt16Samples) {
      merged.set(arr, offset);
      offset += arr.length;
    }

    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
    const audioDuration = (totalLen / sampleRate).toFixed(1);

    if (totalLen > 0) {
      const wavBlob = createWavBlob(merged, sampleRate);
      const url = URL.createObjectURL(wavBlob);
      const player = $('#scenario-player');
      player.src = url;
      player.loop = $('#scenario-loop-check').checked;
      player.classList.remove('hidden');
      $('#scenario-loop-label').style.display = 'flex';
    }

    const latency = tFirst ? ((tFirst - t0) / 1000).toFixed(2) : '-';
    $('#scenario-status').textContent = `Done in ${elapsed}s — Latency: ${latency}s (${audioDuration}s audio, ${chunkCount} chunks, ${scenarioData.length} entries)`;

    const remainingTime = Math.max(0, nextStartTime - audioCtx.currentTime);
    setTimeout(() => audioCtx.close().catch(() => {}), (remainingTime + 0.5) * 1000);
    currentAbortController = null;

  } catch (e) {
    if (e.name === 'AbortError') {
      $('#scenario-status').textContent = 'Cancelled';
    } else {
      $('#scenario-status').textContent = 'Error: ' + e.message;
    }
  } finally {
    btn.disabled = false;
    currentAbortController = null;
  }
}
