services:
  # GPU を使うため、ホスト側に NVIDIA Container Toolkit が必要。
  # 未インストールだと `could not select device driver "nvidia" with capabilities: [[gpu]]` で起動失敗する。
  # セットアップ手順 (Ubuntu/Debian):
  #
  #   # 1. リポジトリ追加
  #   curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
  #     sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  #   curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
  #     sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
  #     sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  #
  #   # 2. インストール
  #   sudo apt-get update
  #   sudo apt-get install -y nvidia-container-toolkit
  #
  #   # 3. Docker にランタイム登録 + 再起動
  #   sudo nvidia-ctk runtime configure --runtime=docker
  #   sudo systemctl restart docker
  qwen3-tts:
    image: 950363886025.dkr.ecr.ap-northeast-1.amazonaws.com/qwen3-tts-stream:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen3-tts
    restart: unless-stopped
    ports:
      - "8889:8889"
    volumes:
      - ./designed_references:/app/designed_references
      - ./pron_dict.json:/app/pron_dict.json
      - hf-cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "2gb"

  gpt-oss-llm:
    image: 950363886025.dkr.ecr.ap-northeast-1.amazonaws.com/gpt-oss-llm:latest
    container_name: gpt-oss-llm
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ../gpt-oss/professor_data:/app/professor_data
      - ../gpt-oss/.apikeys.txt:/app/.apikeys.txt
      - ../gpt-oss/.custom-auth.txt:/app/.custom-auth.txt
      - ../paper:/app/paper
      - hf-cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
      - LAB_ID=lab-A
      - LAB_NAME=ネットワークチーム
      - LAB_SUMMARY=IPSJ/OS/DPS の最新 + 研究報告論文を中心
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "2gb"

  tunnel:
    image: 950363886025.dkr.ecr.ap-northeast-1.amazonaws.com/proxy-tunnel:latest
    container_name: proxy-tunnel
    restart: unless-stopped
    # tunnel が転送先とする LLM サーバ (localhost:8081) はホスト上で動いているため、
    # コンテナから `localhost` でホストに届くよう host ネットワークを使用。
    network_mode: host
    environment:
      - PROXY_WS_URL=ws://monst-proxy-1088691528.ap-northeast-1.elb.amazonaws.com/tunnel
      - LOCAL_URL=http://localhost:8081

volumes:
  hf-cache:
